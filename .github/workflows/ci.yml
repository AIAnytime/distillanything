name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install (CPU torch)
        run: |
          uv venv
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check distillanything tests

      - name: Tests (fully offline)
        env:
          HF_HUB_OFFLINE: "1"
        run: uv run pytest -v

      - name: End-to-end smoke (tiny random models)
        env:
          HF_HUB_OFFLINE: "1"
        run: uv run distill smoke
